name: Create Release For Renovate
on: { push: { branches: [ 'main' ] } }
jobs:
  renovate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: infrabits/ci-create-renovate-release@99a3ddfb889b29e15f753beac630159376f82d27 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
